<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact - MyBiz</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>

        <!-- Navigation -->
        <header id="mainHeader"
            class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">MyBiz</a>

                <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end"
                    id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link"
                                href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link"
                                href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link"
                                href="services.html">Services</a></li>
                        <li class="nav-item"><a class="nav-link active"
                                href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Page Header -->
        <section class="hero-section bg-primary text-white py-5">
            <div class="container text-center">
                <h1 class="display-5 fw-bold">Contact Us</h1>
                <p class="lead">We’re ready to help your business grow</p>
            </div>
        </section>

        <!-- Contact Content -->
        <section class="py-5 fade-in-on-scroll">
            <div class="container">
                <div class="row g-4">

                    <!-- Info -->
                    <div class="col-md-6">
                        <h3 class="fw-bold mb-3">Get in Touch</h3>
                        <p><strong>Address:</strong> 123 Business Street, Suite
                            100</p>
                        <p><strong>Phone:</strong> (123) 456-7890</p>
                        <p><strong>Email:</strong> info@mybiz.com</p>
                        <p><strong>Hours:</strong> Mon–Fri, 9 AM – 5 PM</p>
                    </div>

                    <!-- Form -->
                    <div class="col-md-6">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="4"
                                    required></textarea>
                            </div>
                            <button class="btn btn-primary">Submit</button>
                        </form>
                    </div>

                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="bg-dark text-white py-4 mt-5">
            <div class="container text-center">
                <p class="mb-0">&copy; 2024 MyBiz. All rights reserved.</p>
            </div>
        </footer>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/script.js"></script>

    </body>
</html>
